name: NumFn
options:
  minimumXcodeGenVersion: 2.45.0
  bundleIdPrefix: app.numfn
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  NumFn:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NumFn
        excludes:
          - Resources/Info.plist
    resources:
      - path: NumFn/Resources
        excludes:
          - Info.plist
          - NumFn.entitlements
    info:
      path: NumFn/Resources/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: Copyright 2026 NumFn contributors.
        NumFnPrivacyPolicyURL: https://numfn.app/privacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.numfn.NumFn
        PRODUCT_NAME: NumFn
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 0.1.6
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
  NumFnTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NumFnTests
    dependencies:
      - target: NumFn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.numfn.NumFnTests
schemes:
  NumFn:
    build:
      targets:
        NumFn: all
    test:
      targets:
        - name: NumFnTests
